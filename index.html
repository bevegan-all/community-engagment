<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEP Topic Selection</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        /* Customizing Tom Select to match modern Tailwind inputs */
        .ts-control {
            padding: 0.875rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }
        .ts-control.focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .ts-dropdown {
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .ts-dropdown .option {
            padding: 0.75rem 1rem;
        }
        .ts-dropdown .option.active {
            background-color: #eff6ff;
            color: #1d4ed8;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        
        <div class="bg-gradient-to-r from-brand-600 to-indigo-700 px-6 py-8 sm:px-10 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-white/20 rounded-full mb-4 ring-4 ring-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h2 class="text-2xl sm:text-3xl font-bold text-white tracking-tight">CEP Topic Selection</h2>
            <p class="text-brand-100 mt-2 text-sm sm:text-base font-medium">Community Engagement Program Portal</p>
        </div>
        
        <form id="cepForm" class="p-6 sm:p-10 space-y-8">
            
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700">Problem Statement <span class="text-red-500">*</span></label>
                <select id="topicSelect" name="problemNo" placeholder="Loading topics..." required disabled>
                    <option value="">Fetching available topics...</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center space-x-2 mb-4 pb-3 border-b border-slate-200">
                        <div class="p-1.5 bg-brand-100 rounded-md text-brand-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <h3 class="font-bold text-slate-800">Student 1 <span class="text-xs font-normal text-slate-500 ml-1">(Mandatory)</span></h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Roll Number</label>
                            <input type="text" id="s1Roll" placeholder="e.g., SE3301" required
                                   class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-800 uppercase focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all placeholder-slate-400">
                            <p class="text-[11px] text-slate-500 mt-1.5 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
                                Must be between SE3301 - SE3360
                            </p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Full Name</label>
                            <input type="text" id="s1Name" placeholder="Enter full name" required
                                   class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all placeholder-slate-400">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center space-x-2 mb-4 pb-3 border-b border-slate-200">
                        <div class="p-1.5 bg-indigo-100 rounded-md text-indigo-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <h3 class="font-bold text-slate-800">Student 2 <span class="text-xs font-normal text-slate-500 ml-1">(Mandatory)</span></h3>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Roll Number</label>
                            <input type="text" id="s2Roll" placeholder="e.g., SE3302" required
                                   class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-800 uppercase focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all placeholder-slate-400">
                            <p class="text-[11px] text-slate-500 mt-1.5 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1 text-amber-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
                                Must be between SE3301 - SE3360
                            </p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1">Full Name</label>
                            <input type="text" id="s2Name" placeholder="Enter full name" required
                                   class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all placeholder-slate-400">
                        </div>
                    </div>
                </div>

            </div>

            <div class="pt-4">
                <button type="submit" 
                        class="w-full py-4 px-6 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-700 hover:to-indigo-700 text-white text-lg font-bold rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center space-x-2">
                    <span>Submit Record</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJVVr6W0G1LJ63SEHRqsZOmDm3WmPr5DG-q9wNxF5IfR3d7P2WlQllzqolG9ipM-iv/exec';
        
        let tomSelectInstance;

        // Fetch available topics on load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                // Ensure data is sorted numerically by problem ID before adding to dropdown
                data.availableTopics.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                const selectElement = document.getElementById('topicSelect');
                selectElement.innerHTML = '<option value="">🔍 Search and select a topic...</option>';
                
                data.availableTopics.forEach(topic => {
                    const option = document.createElement('option');
                    option.value = topic.id;
                    option.text = `${topic.id} - ${topic.title}`;
                    selectElement.appendChild(option);
                });

                selectElement.disabled = false;
                
                // Initialize Tom Select
                tomSelectInstance = new TomSelect("#topicSelect",{
                    create: false,
                    maxOptions: null, // Shows all available options, disables the 50 item limit
                    sortField: {
                        field: "$order", // Preserves the exact array order we just sorted numerically
                        direction: "asc"
                    },
                    placeholder: "🔍 Search and select a topic..."
                });

            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Connection Error',
                    text: 'Failed to load topics. Please check your internet connection and try again.',
                    confirmButtonColor: '#3b82f6'
                });
            }
        });

        // Validation Function
        function validateRollNo(rollNo) {
            const regex = /^SE33(0[1-9]|[1-5][0-9]|60)$/i; 
            return regex.test(rollNo);
        }

        // Form Submission Handler
        document.getElementById('cepForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const problemNo = document.getElementById('topicSelect').value;
            const s1Roll = document.getElementById('s1Roll').value.trim().toUpperCase();
            const s1Name = document.getElementById('s1Name').value.trim();
            const s2Roll = document.getElementById('s2Roll').value.trim().toUpperCase();
            const s2Name = document.getElementById('s2Name').value.trim();

            if (!problemNo) {
                Swal.fire({ icon: 'warning', title: 'Missing Topic', text: 'Please select a problem statement.', confirmButtonColor: '#3b82f6' });
                return;
            }

            if (!validateRollNo(s1Roll) || !validateRollNo(s2Roll)) {
                Swal.fire({ icon: 'error', title: 'Invalid Roll Number', text: 'Roll numbers must be between SE3301 and SE3360.', confirmButtonColor: '#3b82f6' });
                return;
            }

            if (s1Roll === s2Roll) {
                Swal.fire({ icon: 'error', title: 'Duplicate Entry', text: 'Student 1 and Student 2 cannot have the same roll number.', confirmButtonColor: '#3b82f6' });
                return;
            }

            const payload = { problemNo, s1Roll, s1Name, s2Roll, s2Name };

            // Submitting Animation
            Swal.fire({
                title: 'Updating Database...',
                text: 'Please wait while we secure your topic.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        confirmButtonColor: '#10b981'
                    }).then(() => {
                        document.getElementById('cepForm').reset();
                        tomSelectInstance.clear(); 
                        location.reload(); 
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Registration Failed', text: result.message, confirmButtonColor: '#ef4444' });
                }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'Server Error', text: 'Could not connect to the database. Please try again.', confirmButtonColor: '#3b82f6' });
            }
        });
    </script>
</body>
</html>
